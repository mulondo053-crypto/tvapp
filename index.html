<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Control — Channel Lineup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#0a0c10;
    --bg-panel:#12151b;
    --bg-card:#171b22;
    --bg-input:#0d1015;
    --border:#242a34;
    --border-soft:#1c2129;
    --text-primary:#e7eaee;
    --text-muted:#8791a0;
    --text-dim:#5c6472;
    --tally-red:#ff3b30;
    --tally-red-dim:#5c1b18;
    --signal-green:#35d07f;
    --accent-amber:#f5a623;
    --accent-blue:#4fa8ff;
    --font-display:'Oswald',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background:var(--bg-base);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(79,168,255,0.05), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(255,59,48,0.04), transparent 40%);
    color:var(--text-primary);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  a{color:var(--accent-blue);}

  /* ---------- Top bar ---------- */
  .masthead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;
    padding:18px 32px;
    background:linear-gradient(180deg, var(--bg-panel), #0f1116);
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:50;
    flex-wrap:wrap;
  }

  .masthead-left{display:flex;align-items:center;gap:16px;}

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .brand-mark{
    width:12px;height:12px;border-radius:50%;
    background:var(--tally-red);
    box-shadow:0 0 10px 2px rgba(255,59,48,0.6);
    animation:pulse-live 2s infinite ease-in-out;
    flex-shrink:0;
  }

  .brand-text{
    font-family:var(--font-display);
    font-weight:600;
    letter-spacing:0.08em;
    font-size:20px;
    text-transform:uppercase;
    line-height:1;
  }

  .brand-sub{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.05em;
    margin-top:2px;
  }

  .timecode{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-muted);
    background:var(--bg-input);
    border:1px solid var(--border-soft);
    padding:6px 12px;
    border-radius:4px;
    letter-spacing:0.05em;
    white-space:nowrap;
  }

  .timecode strong{color:var(--text-primary);font-weight:500;}

  .masthead-right{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .dirty-readout{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:0.03em;
  }

  .dirty-readout.has-changes{color:var(--accent-amber);}

  .dirty-dot{
    display:inline-block;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--text-dim);
    margin-right:6px;
  }

  .dirty-readout.has-changes .dirty-dot{
    background:var(--accent-amber);
    box-shadow:0 0 6px 1px rgba(245,166,35,0.7);
  }

  .btn{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-size:13px;
    font-weight:500;
    border:1px solid var(--border);
    background:var(--bg-card);
    color:var(--text-primary);
    padding:10px 18px;
    border-radius:4px;
    cursor:pointer;
    transition:all 0.15s ease;
  }

  .btn:hover{border-color:var(--accent-blue);color:var(--accent-blue);}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}

  .btn-primary{
    background:var(--signal-green);
    border-color:var(--signal-green);
    color:#08150f;
  }
  .btn-primary:hover{background:#3fe28e;border-color:#3fe28e;color:#08150f;}

  .btn-small{
    padding:7px 12px;
    font-size:11px;
  }

  /* ---------- Layout ---------- */
  .wrap{
    max-width:1280px;
    margin:0 auto;
    padding:28px 32px 80px;
  }

  .section-label{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:0.12em;
    text-transform:uppercase;
    margin:0 0 16px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--border-soft);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));
    gap:20px;
  }

  /* ---------- Channel card ---------- */
  .card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
    transition:border-color 0.2s ease;
    display:flex;
    flex-direction:column;
  }

  .card.is-dirty{border-color:var(--accent-amber);}

  .card-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    padding:16px 18px 14px;
    border-bottom:1px solid var(--border-soft);
    gap:12px;
  }

  .card-head-left{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }

  .logo-frame{
    width:48px;height:48px;
    border-radius:6px;
    border:1px solid var(--border-soft);
    background:var(--bg-input);
    flex-shrink:0;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .logo-frame img{width:100%;height:100%;object-fit:cover;display:block;}

  .channel-name{
    font-family:var(--font-display);
    font-size:17px;
    font-weight:500;
    letter-spacing:0.02em;
    line-height:1.2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .channel-meta{
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:4px;
  }

  .tally{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--tally-red-dim);
    flex-shrink:0;
  }

  .tally.on{
    background:var(--tally-red);
    box-shadow:0 0 6px 1px rgba(255,59,48,0.7);
    animation:pulse-live 1.8s infinite ease-in-out;
  }

  .channel-status{
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--text-dim);
    letter-spacing:0.05em;
    text-transform:uppercase;
  }

  .channel-num{
    font-family:var(--font-display);
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:0.08em;
    border:1px solid var(--border-soft);
    padding:3px 8px;
    border-radius:20px;
    flex-shrink:0;
  }

  .vu{
    display:flex;
    gap:2px;
    height:3px;
    margin:0 18px;
  }

  .vu span{
    flex:1;
    background:var(--border-soft);
    border-radius:1px;
  }

  .card-body{
    padding:16px 18px 18px;
    display:flex;
    flex-direction:column;
    gap:12px;
    flex:1;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .field label{
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--text-dim);
    letter-spacing:0.1em;
    text-transform:uppercase;
  }

  .field input,
  .field select{
    background:var(--bg-input);
    border:1px solid var(--border-soft);
    color:var(--text-primary);
    font-family:var(--font-mono);
    font-size:12.5px;
    padding:9px 10px;
    border-radius:4px;
    width:100%;
    outline:none;
    transition:border-color 0.15s ease;
  }

  .field input:focus,
  .field select:focus{
    border-color:var(--accent-blue);
  }

  .field select{
    appearance:none;
    background-image:linear-gradient(45deg, transparent 50%, var(--text-muted) 50%), linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
    background-position:calc(100% - 16px) center, calc(100% - 11px) center;
    background-size:5px 5px, 5px 5px;
    background-repeat:no-repeat;
    cursor:pointer;
  }

  .card-foot{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 18px;
    border-top:1px solid var(--border-soft);
    background:rgba(255,255,255,0.012);
  }

  .row-status{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-dim);
  }

  .row-status.saved{color:var(--signal-green);}
  .row-status.pending{color:var(--accent-amber);}

  /* ---------- Toasts ---------- */
  .toast-stack{
    position:fixed;
    bottom:24px;
    right:24px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:100;
  }

  .toast{
    font-family:var(--font-body);
    font-size:13.5px;
    padding:13px 16px;
    border-radius:6px;
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-left:3px solid var(--signal-green);
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    min-width:260px;
    max-width:360px;
    animation:toast-in 0.25s ease;
  }

  .toast.error{border-left-color:var(--tally-red);}
  .toast strong{display:block;font-family:var(--font-display);font-size:12px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px;}
  .toast.error strong{color:var(--tally-red);}
  .toast:not(.error) strong{color:var(--signal-green);}

  /* ---------- Empty / loading ---------- */
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--text-muted);
    font-family:var(--font-mono);
    font-size:13px;
  }

  /* ---------- Animations ---------- */
  @keyframes pulse-live{
    0%,100%{opacity:1;}
    50%{opacity:0.35;}
  }

  @keyframes toast-in{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
  }

  @media (max-width:640px){
    .masthead{padding:14px 18px;}
    .wrap{padding:20px 16px 60px;}
    .brand-text{font-size:16px;}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;}
  }
</style>
</head>
<body>

  <header class="masthead">
    <div class="masthead-left">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-text">Master Control</div>
          <div class="brand-sub">CHANNEL LINEUP · streams.json</div>
        </div>
      </div>
    </div>
    <div class="masthead-right">
      <div class="timecode" id="timecode">--:--:--</div>
      <div class="dirty-readout" id="dirtyReadout"><span class="dirty-dot"></span>No unsaved changes</div>
      <button class="btn" id="reloadBtn" type="button">Reload</button>
      <button class="btn btn-primary" id="saveAllBtn" type="button">Save All</button>
    </div>
  </header>

  <div class="wrap">
    <p class="section-label" id="gridLabel">Loading lineup…</p>
    <div class="grid" id="grid"></div>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <template id="cardTemplate">
    <div class="card">
      <div class="card-head">
        <div class="card-head-left">
          <div class="logo-frame"><img alt=""></div>
          <div>
            <div class="channel-name"></div>
            <div class="channel-meta">
              <span class="tally on"></span>
              <span class="channel-status">On Air</span>
            </div>
          </div>
        </div>
        <div class="channel-num"></div>
      </div>
      <div class="vu">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="card-body">
        <div class="field">
          <label for="">Stream URL</label>
          <input type="text" data-field="url" spellcheck="false">
        </div>
        <div class="field">
          <label>Type</label>
          <select data-field="type">
            <option value="HLS">HLS</option>
            <option value="DASH">DASH</option>
            <option value="MP4">MP4</option>
            <option value="MP3">MP3</option>
            <option value="RTMP">RTMP</option>
            <option value="YouTube">YouTube</option>
          </select>
        </div>
        <div class="field">
          <label>Fallback URL</label>
          <input type="text" data-field="fallback_url" spellcheck="false">
        </div>
        <div class="field">
          <label>Off-Air URL</label>
          <input type="text" data-field="offair_url" spellcheck="false">
        </div>
      </div>
      <div class="card-foot">
        <span class="row-status">Untouched</span>
        <button class="btn btn-small" data-action="save-one" type="button">Save Channel</button>
      </div>
    </div>
  </template>

<script>
(function(){
  'use strict';

  const grid = document.getElementById('grid');
  const gridLabel = document.getElementById('gridLabel');
  const cardTemplate = document.getElementById('cardTemplate');
  const toastStack = document.getElementById('toastStack');
  const dirtyReadout = document.getElementById('dirtyReadout');
  const saveAllBtn = document.getElementById('saveAllBtn');
  const reloadBtn = document.getElementById('reloadBtn');
  const timecodeEl = document.getElementById('timecode');

  let channels = [];       // in-memory working copy
  let dirtyCount = 0;

  // ---------- Broadcast clock ----------
  function tickClock(){
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    timecodeEl.innerHTML = `<strong>${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}</strong>`;
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ---------- Toasts ----------
  function toast(title, message, isError){
    const el = document.createElement('div');
    el.className = 'toast' + (isError ? ' error' : '');
    el.innerHTML = `<strong>${title}</strong>${message}`;
    toastStack.appendChild(el);
    setTimeout(() => {
      el.style.transition = 'opacity 0.3s ease';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    }, 4200);
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  // ---------- Dirty tracking ----------
  function setDirty(count){
    dirtyCount = count;
    if (dirtyCount > 0){
      dirtyReadout.classList.add('has-changes');
      dirtyReadout.innerHTML = `<span class="dirty-dot"></span>${dirtyCount} unsaved change${dirtyCount === 1 ? '' : 's'}`;
    } else {
      dirtyReadout.classList.remove('has-changes');
      dirtyReadout.innerHTML = `<span class="dirty-dot"></span>No unsaved changes`;
    }
  }

  function recalcDirty(){
    const count = document.querySelectorAll('.card.is-dirty').length;
    setDirty(count);
  }

  // ---------- Rendering ----------
  function renderChannels(list){
    grid.innerHTML = '';

    if (!list.length){
      grid.innerHTML = '<div class="empty-state">No channels in the lineup yet. Add entries to streams.json to bring them on air.</div>';
      gridLabel.textContent = 'Lineup empty';
      return;
    }

    gridLabel.textContent = `${list.length} channel${list.length === 1 ? '' : 's'} in rotation`;

    list.forEach((channel, index) => {
      const node = cardTemplate.content.firstElementChild.cloneNode(true);
      const card = node;
      card.dataset.index = index;

      card.querySelector('.channel-name').textContent = channel.name || 'Untitled Channel';
      card.querySelector('.channel-num').textContent = 'CH ' + String(index + 1).padStart(2, '0');

      const img = card.querySelector('.logo-frame img');
      if (channel.logo){
        img.src = channel.logo;
        img.alt = channel.name || '';
        img.onerror = () => { img.style.display = 'none'; };
      } else {
        img.style.display = 'none';
      }

      card.querySelector('[data-field="url"]').value = channel.url || '';
      card.querySelector('[data-field="type"]').value = channel.type || 'HLS';
      card.querySelector('[data-field="fallback_url"]').value = channel.fallback_url || '';
      card.querySelector('[data-field="offair_url"]').value = channel.offair_url || '';

      // Track edits per-field
      card.querySelectorAll('[data-field]').forEach(input => {
        input.addEventListener('input', () => {
          const field = input.dataset.field;
          channels[index][field] = input.value;
          markDirty(card);
        });
        input.addEventListener('change', () => {
          const field = input.dataset.field;
          channels[index][field] = input.value;
          markDirty(card);
        });
      });

      card.querySelector('[data-action="save-one"]').addEventListener('click', () => {
        saveChannels(`Saved "${channel.name}".`, card);
      });

      grid.appendChild(card);
    });
  }

  function markDirty(card){
    if (!card.classList.contains('is-dirty')){
      card.classList.add('is-dirty');
      const status = card.querySelector('.row-status');
      status.textContent = 'Pending save';
      status.className = 'row-status pending';
    }
    recalcDirty();
  }

  function markClean(card){
    card.classList.remove('is-dirty');
    const status = card.querySelector('.row-status');
    status.textContent = 'Saved';
    status.className = 'row-status saved';
    setTimeout(() => {
      if (!card.classList.contains('is-dirty')){
        status.textContent = 'Untouched';
        status.className = 'row-status';
      }
    }, 3000);
  }

  // ---------- Load ----------
  function loadChannels(){
    gridLabel.textContent = 'Loading lineup…';
    return fetch('streams.json', { cache: 'no-store' })
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(data => {
        channels = Array.isArray(data.channels) ? data.channels : [];
        renderChannels(channels);
        setDirty(0);
      })
      .catch(err => {
        gridLabel.textContent = 'Could not load streams.json';
        toast('Load failed', escapeHtml(err.message || 'Unknown error'), true);
      });
  }

  // ---------- Save ----------
  function saveChannels(successMessage, singleCard){
    const payload = JSON.stringify({ channels });
    const btns = document.querySelectorAll('[data-action="save-one"], #saveAllBtn');
    btns.forEach(b => b.disabled = true);

    return fetch('save.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: payload
    })
      .then(res => res.json().catch(() => {
        throw new Error('Server did not return valid JSON.');
      }).then(data => ({ ok: res.ok, data })))
      .then(({ ok, data }) => {
        if (!ok || !data.success){
          throw new Error(data && data.message ? data.message : 'Save failed.');
        }
        toast('Saved', successMessage || data.message || 'Changes written to streams.json.', false);

        if (singleCard){
          markClean(singleCard);
        } else {
          document.querySelectorAll('.card.is-dirty').forEach(markClean);
        }
        recalcDirty();
      })
      .catch(err => {
        toast('Save failed', escapeHtml(err.message || 'Unknown error'), true);
      })
      .finally(() => {
        btns.forEach(b => b.disabled = false);
      });
  }

  saveAllBtn.addEventListener('click', () => {
    if (dirtyCount === 0){
      toast('Nothing to save', 'There are no unsaved changes in the lineup.', false);
      return;
    }
    saveChannels(`Saved ${dirtyCount} channel${dirtyCount === 1 ? '' : 's'}.`);
  });

  reloadBtn.addEventListener('click', () => {
    if (dirtyCount > 0){
      const proceed = confirm('You have unsaved changes that will be discarded. Reload anyway?');
      if (!proceed) return;
    }
    loadChannels();
  });

  loadChannels();
})();
</script>

</body>
</html>
